et:
  result_mailer:
    winner_email:
      subject: "Teie pakkumine domeenile %{domain_name} oli edukas"
      salutation: "Lugupeetud, %{display_name}"
      introduction: |
        Anname teada, et teie pakkumine domeeni
        %{domain_name} registreerimise eelisõigusele oli edukas.
      details_html: |
        %{domain_name} registreerimise eelisõiguse saamiseks tuleb teil tasuda ettemaksuarve %{link}. 7 päeva jooksul. Soovi korral saate Oksjonikeskkonnas enne tasumist muuta ka arve saaja andmeid. 
      linkpay_html: |
        Saad arve koheselt tasuda selle <a href=%{linkpay_url}>lingi</a> abil.
      auction_link: ".ee oksjonikeskkonnas"
      details_second_para_html: |
        Arve õigeaegsel tasumisel leiate oma kasutajakonto alt vastava reserveerimiskoodi,
        millega saate %{registration_limit}. päeva jooksul domeeni %{domain_name}
        registreerida 
        <a href="https://www.internet.ee/registripidaja/akrediteeritud-registripidajad">
        .ee akrediteeritud registripidaja</a> juures. Soovitame registripidajaga ühendust võtta esimesel võimalusel - toimingu viimasele päevale
        jätmisel ei pruugi teenusepakkujal olla võimalik domeeni registreerida.

      details_third_para: |
        Ettemaksuarve tähtajaks tasumata jätmisel ei saa te domeeni 
        %{domain_name} registreerida ning see läheb tagasi oksjonile.
        Tulenevalt <a href="https://www.internet.ee/domeenid/domeenide-oksjonikeskkonna-kasutajatingimused">Oksjonikeskkonna kasutajatingimustest</a>
        ei saa teie samal oksjonil uuesti osaleda.

        Juhul, kui tasute arve maksetähtaja ületamisel ehk pärast 7 päeva
        möödumist, tühistatakse selle arve maksmata jätmise tõttu 
        rakendatud piirangud. Sellisel juhul saate võimaluse osaleda
        vastava domeeninime oksjonil uuesti.

        Lisaküsimuste korral võtke meiega palun ühendust info@internet.ee
        või +372 727 1000.

        Lugupidamisega,

    registration_code_email:
      subject: "%{domain_name} registreerimise kood on nüüd kättesaadav"
      salutation: "Lugupeetud, %{display_name}"
      introduction_html: |
        Domeeni %{domain_name} registreerimise koodi leiad .ee oksjonikeskkonnast %{link}.
      details: |
        Kood kehtib %{days} päeva. Pöörduge .ee akrediteeritud registripidaja poole
        %{domain_name} registreerimiseks esimesel võimalusel! Viimasele hetkele jätmise
        korral ei pruugi teenusepakkujal olla võimalik domeeni registreerida. Domeeninime
        registreerimine on tasuline vastavalt valitud registripidaja hinnakirjale.
      reminder: |
        Juhul, kui Te õigeaegselt registripidaja poole %{domain_name} registreerimiseks ei pöördu,
        eelisõigus tühistatakse. Enampakkumisel makstud tasu ei hüvitata ja domeeninime
        registreerimise eelisõigus läheb tagasi oksjonile.
      link_title: "siit"

    participant_email:
      subject: "Domeeni %{domain_name} pakkumine ei olnud edukas"
      salutation: "Lugupeetud, %{display_name}"
      first_para: |
        Teie pakkumine domeeni eelisõiguse oksjonil domeenile %{domain_name}
        ei olnud edukas.
      second_para: |
        Pakkumised on salajased ja avalikult teiste pakkumuste infot ei väljastata.
