en:
  invoice_mailer:
    reminder_email:
      subject: "%{domain_name} invoice due date"
      salutation: "Dear %{display_name} auction winner,"
      introduction: |
        We would like to remind you that the due date of the invoice for the
        preferential right to register the %{domain_name} domain is on %{due_date}.
      details: |
        According to the Auction portal terms of use, in the case of failed
        payment, you will lose the right to the auctioned priority of
        registration for the %{domain_name} domain. After that, the 
        domain will be returned to the auction.

        In addition, you will not be able to participate in the auction of the
        same domain again. In the case of having a third unpaid invoice,
        you will not be able to participate in .ee domain auctions for the 
        following year.

        It is possible to pay the invoice past the due date. This will lift the
        ban to participate in the future auctions of the domain.
      linkpay_html: |
        You can pay for this invoice using following <a href=%{linkpay_url}>link</a>.

        For additional questions, please contact us at info@internet.ee

        Sincerely,
